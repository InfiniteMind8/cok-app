name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cok_test
          POSTGRES_PASSWORD: cok_test
          POSTGRES_DB: cok_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cok_test:cok_test@localhost:5432/cok_test
      DIRECT_URL: postgresql://cok_test:cok_test@localhost:5432/cok_test
      NEXT_PUBLIC_DEMO_MODE_ENABLED: "true"
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      # Clerk secrets — stored in GitHub repository secrets
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /
      # Optional — omit to use in-memory rate limiter in tests
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      # Sentry — omit DSN to disable error capture in test runs
      NEXT_PUBLIC_SENTRY_DSN: ""
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: website
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Prisma migrations
        working-directory: website
        run: pnpm prisma migrate deploy

      - name: Build Next.js
        working-directory: website
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run E2E tests
        working-directory: website
        run: pnpm test:e2e --reporter=github
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7
